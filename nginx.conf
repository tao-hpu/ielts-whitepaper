server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源带 hash，可长期缓存
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不缓存，保证新版本即时生效
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA 路由回退：深链接（如 /ch/reading-tfng）优先命中预渲染的
    # /ch/<slug>/index.html（直接返回、不做补斜杠的 301，保持无斜杠 canonical），
    # 否则回退到 /index.html 交给前端路由。
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
